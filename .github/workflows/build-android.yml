name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug:
        description: "Skip build, only validate secrets"
        type: boolean
        default: false

env:
  # Global environment variables for R2 storage
  R2_ENDPOINT: https://76f91d4a19eb310b8a1eee846a8d807b.r2.cloudflarestorage.com
  R2_BUCKET: holy
  R2_PUBLIC: https://r2.lelexue.cn

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Debug: validate all secrets before spending time on build ──
      - name: Validate all secrets
        env:
          TEST_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          TEST_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TEST_R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          TEST_R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          ALL_OK=true
          secrets_status=""
          for entry in \
            "ANDROID_KEYSTORE_B64|TEST_KEYSTORE_B64" \
            "KEYSTORE_PASSWORD|TEST_KEYSTORE_PASSWORD" \
            "R2_ACCESS_KEY|TEST_R2_ACCESS_KEY" \
            "R2_SECRET_KEY|TEST_R2_SECRET_KEY"; do
            NAME="${entry%%|*}"
            VAR="${entry##*|}"
            VAL="${!VAR}"
            if [ -z "$VAL" ]; then
              echo "::error::$NAME → EMPTY (not set in GitHub Secrets)"
              ALL_OK=false
              secrets_status="${secrets_status}❌ ${NAME}  "
            else
              echo "✅ $NAME → ${#VAL} chars"
              secrets_status="${secrets_status}✅ ${NAME}  "
            fi
          done
          echo ""
          echo "Secrets summary: $secrets_status"
          echo ""
          if [ "$ALL_OK" = false ]; then
            echo "::error::Some secrets are missing. Fix them before running the build."
            exit 1
          fi
          echo "All 4 secrets are properly configured!"

      # ── Debug mode: stop here if debug=true ──
      - name: Stop early in debug mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug }}
        run: |
          echo "🧪 Debug mode enabled. Build skipped."
          echo "All secrets validated successfully. Exiting early."
          exit 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: "gradle" # Cache Gradle dependencies for faster builds

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Restore keystore from secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            mkdir -p src-tauri/gen/android
            echo "$KEYSTORE_B64" | base64 -d > src-tauri/gen/android/keystore.jks
          fi

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Patch version in tauri.conf.json
        run: |
          VERSION="0.1.${{ github.run_number }}"
          echo "Patching version to ${VERSION}"
          # Use jq to update the version field in tauri.conf.json
          jq --arg v "${VERSION}" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Patched version: $(jq -r '.version' src-tauri/tauri.conf.json)"

      - name: Build Android APK
        env:
          # Injected for frontend frameworks (Svelte/Nuxt)
          PUBLIC_R2: ${{ env.R2_PUBLIC }}
          VITE_PUBLIC_R2: ${{ env.R2_PUBLIC }}
          # Absolute path ensures Gradle finds the keystore regardless of working directory
          KEYSTORE_PATH: ${{ github.workspace }}/src-tauri/gen/android/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: upload
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        # The `src-tauri/gen/android/` directory is committed to the repo,
        # including custom MainActivity.kt / themes.xml / colors.xml.
        # No need to run `tauri android init` (it would regenerate template files).
        # `tauri android build` uses the existing project files as-is.
        run: |
          bunx tauri android build --target aarch64

      - name: Sign APK if unsigned
        run: |
          KEYSTORE="${{ github.workspace }}/src-tauri/gen/android/keystore.jks"
          if [ ! -f "$KEYSTORE" ]; then
            echo "Keystore not found; APK will remain unsigned."
            exit 0
          fi

          # Check if the built APK is unsigned
          UNSIGNED_APK=$(find src-tauri/gen/android -name "*unsigned*.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found; assuming it's already signed."
            exit 0
          fi

          echo "Found unsigned APK: $UNSIGNED_APK"
          SIGNED_APK="${UNSIGNED_APK//-unsigned/}"

          # Find apksigner from Android SDK
          APKSIGNER=$(find "$ANDROID_HOME" -name "apksigner" -type f 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ]; then
            # Try build-tools path directly
            APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
          fi

          echo "Using apksigner: $APKSIGNER"
          echo "Signing APK..."

          "$APKSIGNER" sign --ks "$KEYSTORE" \
            --ks-key-alias upload \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

          # Verify signature
          "$APKSIGNER" verify "$SIGNED_APK"
          echo "APK signed successfully: $SIGNED_APK"

      - name: Locate and prepare APK
        run: |
          mkdir -p dist
          # Prefer signed APK (without "unsigned" in name)
          APK=$(find src-tauri/gen/android -name "*.apk" -type f ! -name "*unsigned*" ! -name "*unaligned*" | head -1)

          # Fall back to unsigned APK if no signed one found
          if [ -z "$APK" ]; then
            echo "Warning: No signed APK found, falling back to unsigned."
            APK=$(find src-tauri/gen/android -name "*.apk" -type f ! -name "*unaligned*" | head -1)
          fi

          if [ -z "$APK" ]; then
            echo "Error: No APK found after build."
            exit 1
          fi

          echo "Found APK at: $APK"
          cp "$APK" dist/stone.apk

      - name: Generate updater manifest
        run: |
          # Read the version from the (already patched) tauri.conf.json
          APK_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          NOTES="Build #${{ github.run_number }} from ${{ github.sha }}"
          bash scripts/update/generate-manifest.sh "${APK_VERSION}" "${NOTES}"
          cp update.json dist/update.json

      - name: Upload to Cloudflare R2
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          # Validate secrets are non-empty
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::Secret R2_ACCESS_KEY is empty or not set."
            echo "::error::Please go to GitHub repo → Settings → Secrets and variables → Actions → Secrets"
            echo "::error::and add: R2_ACCESS_KEY = 85ac4a675838688f09e61e8e52ca24bc"
            exit 1
          fi
          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::Secret R2_SECRET_KEY is empty or not set."
            echo "::error::Please go to GitHub repo → Settings → Secrets and variables → Actions → Secrets"
            echo "::error::and add: R2_SECRET_KEY = dd28cc17212f27ebd63fe8bd597671369877f9bf31d0aad4c636b26a7cfa0b3f"
            exit 1
          fi
          echo "R2 secrets are properly configured."

          # Install AWS CLI if not present
          if ! command -v aws &> /dev/null; then
            echo "Installing AWS CLI..."
            curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
          fi

          # Configure credentials via env vars (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
          # The AWS CLI reads these automatically, no need for aws configure set

          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)

          # Upload unique versioned APK
          aws s3 cp dist/stone.apk "s3://${{ env.R2_BUCKET }}/apk/stone-${SHORT_SHA}-${TIMESTAMP}.apk" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --region auto

          # Update the latest pointer
          aws s3 cp dist/stone.apk "s3://${{ env.R2_BUCKET }}/apk/stone-latest.apk" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --region auto

          # Upload updater manifest
          aws s3 cp dist/update.json "s3://${{ env.R2_BUCKET }}/apk/update.json" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --region auto

          echo "Public Link: ${{ env.R2_PUBLIC }}/apk/stone-latest.apk"
          echo "Manifest:    ${{ env.R2_PUBLIC }}/apk/update.json"

      - name: Clean up old APKs from R2
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          LATEST="apk/stone-latest.apk"

          echo "Listing existing APKs in R2 bucket (${{ env.R2_BUCKET }}/apk/)..."
          OBJECTS=$(aws s3api list-objects --bucket "${{ env.R2_BUCKET }}" \
            --prefix "apk/" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" \
            --region auto \
            --query 'Contents[].Key' --output text 2>/dev/null || true)

          if [ -z "$OBJECTS" ] || [ "$OBJECTS" = "None" ]; then
            echo "No existing files to clean up."
            exit 0
          fi

          # Convert tab-separated output to newline-separated list
          ALL_KEYS=$(echo "$OBJECTS" | tr '\t' '\n')

          # Filter versioned APKs (stone-<sha>-<timestamp>.apk), sort ascending
          VERSIONED=$(echo "$ALL_KEYS" \
            | grep -E '^apk/stone-[a-z0-9]+-[0-9]{8}-[0-9]{6}\.apk$' \
            | sort)

          # Keep the 2 most recent versioned APKs (last 2 after sorting)
          KEEP_VERSIONED=$(echo "$VERSIONED" | tail -2)
          # Always keep stone-latest.apk and update.json
          KEEP=$(printf '%s\n%s\n%s' "$KEEP_VERSIONED" "$LATEST" "apk/update.json")

          echo ""
          echo "Files to keep:"
          echo "$KEEP" | sed 's/^/  /'
          echo ""

          DELETED_COUNT=0
          KEPT_COUNT=0
          for key in $ALL_KEYS; do
            # Skip directory markers (e.g., "apk/" itself)
            if [ "$key" = "apk/" ]; then
              continue
            fi

            if echo "$KEEP" | grep -qxF "$key"; then
              echo "  Keeping:  $key"
              KEPT_COUNT=$((KEPT_COUNT + 1))
            else
              echo "  Deleting: $key"
              aws s3 rm "s3://${{ env.R2_BUCKET }}/$key" \
                --endpoint-url "${{ env.R2_ENDPOINT }}" \
                --region auto
              DELETED_COUNT=$((DELETED_COUNT + 1))
            fi
          done

          echo "Cleanup complete. Kept: $KEPT_COUNT, Deleted: $DELETED_COUNT"

      - name: Upload artifact fallback
        # Always run if the file exists to help debugging if R2 upload fails
        if: always() && hashFiles('dist/stone.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: stone-apk-${{ github.run_number }}
          path: dist/stone.apk
