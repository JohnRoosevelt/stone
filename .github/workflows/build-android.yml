name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  R2_ENDPOINT: https://76f91d4a19eb310b8a1eee846a8d807b.r2.cloudflarestorage.com
  R2_BUCKET: holy
  R2_PUBLIC: https://r2.lelexue.cn

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Restore keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > src-tauri/gen/android/keystore.jks
          fi

      - run: bun install --frozen-lockfile

      - name: Build APK
        env:
          PUBLIC_R2: https://r2.lelexue.cn
          KEYSTORE_PATH: ../keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: upload
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 0.1.${{ github.run_number }}
        run: cargo tauri android build --target aarch64

      - name: Locate APK
        run: |
          mkdir -p dist
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | grep -v "unaligned" | head -1)
          ls -lh "$APK"
          cp "$APK" dist/stone.apk

      - name: Upload to R2
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          V=$(git rev-parse --short HEAD)
          TS=$(date -u +%Y%m%d-%H%M%S)
          aws s3 cp dist/stone.apk "s3://${R2_BUCKET}/apk/stone-${V}-${TS}.apk" --endpoint-url "$R2_ENDPOINT" --region auto --acl public-read
          aws s3 cp dist/stone.apk "s3://${R2_BUCKET}/apk/stone-latest.apk" --endpoint-url "$R2_ENDPOINT" --region auto --acl public-read
          echo "Download: ${R2_PUBLIC}/apk/stone-latest.apk"

      - name: Upload artifact (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stone-apk
          path: dist/stone.apk
